  <circle cx="160" cy="180" r="6" fill="url(#gold)" opacity="0.4"/>
  <circle cx="180" cy="170" r="4" fill="url(#gold)" opacity="0.3"/>
  <circle cx="145" cy="195" r="3" fill="url(#gold)" opacity="0.25"/>
  <circle cx="440" cy="300" r="5" fill="url(#gold)" opacity="0.35"/>
  <circle cx="460" cy="290" r="3" fill="url(#gold)" opacity="0.25"/>
  <!-- Nail polish drops -->
  <circle cx="370" cy="250" r="8" fill="rgba(226,197,126,0.3)"/>
  <circle cx="385" cy="260" r="5" fill="rgba(226,197,126,0.2)"/>
