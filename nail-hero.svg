    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e2c57e"/>
      <stop offset="1" stop-color="#b98a5e"/>
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="600" height="750" rx="24"/>
  <!-- Hand silhouette -->
  <path d="M250 550 C240 480 220 400 230 350 C235 320 250 310 260 320 C265 330 260 350 255 370 C260 340 275 310 285 315 C295 320 290 350 280 380 C285 350 300 320 315 325 C325 330 320 360 305 400 C300 420 290 460 285 500 L280 550 Z" fill="rgba(201,169,97,0.12)" stroke="rgba(201,169,97,0.25)" stroke-width="1.5"/>
  <!-- Nail polish bottle -->
  <rect x="330" y="160" width="60" height="80" rx="8" fill="rgba(201,169,97,0.15)" stroke="rgba(201,169,97,0.35)" stroke-width="1.5"/>
  <rect x="340" y="130" width="40" height="35" rx="5" fill="rgba(201,169,97,0.2)" stroke="rgba(201,169,97,0.35)" stroke-width="1.5"/>
  <rect x="350" y="105" width="20" height="30" rx="4" fill="rgba(201,169,97,0.25)" stroke="rgba(201,169,97,0.4)" stroke-width="1.5"/>
  <rect x="355" y="80" width="10" height="28" rx="3" fill="url(#gold)" opacity="0.6"/>
  <!-- Nail file -->
  <rect x="420" y="200" width="120" height="16" rx="8" fill="rgba(201,169,97,0.12)" stroke="rgba(201,169,97,0.3)" stroke-width="1"/>
  <rect x="420" y="200" width="60" height="16" rx="8" fill="rgba(201,169,97,0.18)"/>
