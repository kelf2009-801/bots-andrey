<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BotForge — Telegram Bot Management Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ===== DESIGN SYSTEM ===== */
:root {
  --bg-deep: #0B0F14;
  --bg-secondary: #10151C;
  --bg-panel: #131A22;
  --bg-surface: #171F29;
  --bg-elevated: #1B2430;
  --bg-hover: #1E293B;
  --border: #1E293B;
  --border-light: #263040;
  --border-focus: #334155;
  --text-primary: #F0F3F7;
  --text-secondary: #8B95A5;
  --text-muted: #5A6575;
  --cyan: #06B6D4;
  --cyan-bg: rgba(6,182,212,0.1);
  --blue: #3B82F6;
  --teal: #14B8A6;
  --emerald: #10B981;
  --emerald-bg: rgba(16,185,129,0.1);
  --amber: #F59E0B;
  --amber-bg: rgba(245,158,11,0.1);
  --red: #EF4444;
  --red-bg: rgba(239,68,68,0.1);
  --green: #22C55E;
  --error: #EF4444;
  --success: #22C55E;
  --info: #3B82F6;
  --radius-xs: 4px;
  --radius-sm: 6px;
  --radius: 8px;
  --radius-md: 10px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --shadow: 0 1px 3px rgba(0,0,0,0.4);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.35);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.5);
  --font: 'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --mono: 'JetBrains Mono',monospace;
  --sidebar-w: 240px;
  --topbar-h: 60px;
  --transition: 0.15s ease;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--font);
  background:var(--bg-deep);
  color:var(--text-primary);
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
}
#app{display:flex;height:100vh}

/* ===== SIDEBAR ===== */
.sidebar{
  width:var(--sidebar-w);
  background:var(--bg-secondary);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  flex-shrink:0;
  z-index:100;
  transition:transform var(--transition);
}
.sidebar__brand{
  height:var(--topbar-h);
  padding:0 18px;
  display:flex;
  align-items:center;
  gap:10px;
  border-bottom:1px solid var(--border);
}
.sidebar__brand svg{flex-shrink:0}
.brand-name{font-weight:700;font-size:17px;letter-spacing:-0.3px}
.sidebar__nav{flex:1;overflow-y:auto;padding:10px 8px}
.nav-group{margin-bottom:14px}
.nav-group__title{
  font-size:10px;
  letter-spacing:0.6px;
  color:var(--text-muted);
  text-transform:uppercase;
  padding:4px 10px 6px;
}
.nav-item{
  display:flex;
  align-items:center;
  gap:10px;
  width:100%;
  padding:8px 10px;
  border-radius:var(--radius);
  background:transparent;
  border:none;
  color:var(--text-secondary);
  font-size:13px;
  cursor:pointer;
  transition:all var(--transition);
  text-align:left;
  font-family:var(--font);
  margin-bottom:1px;
}
.nav-item:hover{background:var(--bg-hover);color:var(--text-primary)}
.nav-item.active{background:var(--bg-surface);color:var(--cyan);box-shadow:inset 0 0 0 1px var(--border)}
.nav-item .nav-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.sidebar__bottom{
  padding:12px;
  border-top:1px solid var(--border);
}
.user-card{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  border-radius:var(--radius);
  background:var(--bg-panel);
}
.user-card__avatar{
  width:32px;height:32px;border-radius:50%;
  background:var(--blue);
  display:grid;place-items:center;
  font-size:12px;font-weight:700;flex-shrink:0;
}
.user-card__name{font-size:13px;font-weight:600}
.user-card__role{font-size:11px;color:var(--text-muted)}
.user-card__plan{
  font-size:10px;
  padding:2px 6px;
  border-radius:4px;
  background:var(--cyan-bg);
  color:var(--cyan);
  margin-left:auto;
}

/* ===== MAIN ===== */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{
  height:var(--topbar-h);
  background:var(--bg-secondary);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  padding:0 20px;
  gap:14px;
  flex-shrink:0;
}
.breadcrumb{font-size:13px;color:var(--text-muted);white-space:nowrap}
.breadcrumb span{color:var(--text-primary);font-weight:600;font-size:15px}
.search-wrap{
  flex:1;max-width:360px;
  position:relative;
}
.search-wrap input{
  width:100%;
  background:var(--bg-panel);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:7px 14px 7px 34px;
  color:var(--text-primary);
  font-size:13px;
  outline:none;
  font-family:var(--font);
}
.search-wrap input:focus{border-color:var(--border-focus);box-shadow:0 0 0 3px rgba(6,182,212,0.06)}
.search-wrap .search-icon{position:absolute;left:10px;top:7px;font-size:14px;color:var(--text-muted)}
.topbar__right{display:flex;align-items:center;gap:8px;margin-left:auto}
.btn-icon{
  width:34px;height:34px;
  border-radius:var(--radius);
  background:transparent;
  border:1px solid var(--border);
  color:var(--text-secondary);
  display:grid;place-items:center;
  cursor:pointer;
  font-size:15px;
  transition:all var(--transition);
}
.btn-icon:hover{background:var(--bg-hover);color:var(--text-primary)}
.avatar-circle{
  width:34px;height:34px;border-radius:50%;
  background:var(--teal);
  display:grid;place-items:center;
  font-size:12px;font-weight:700;
  cursor:pointer;
  position:relative;
}
.notif-dot{
  position:absolute;top:-2px;right:-2px;
  width:8px;height:8px;border-radius:50%;
  background:var(--red);
  border:2px solid var(--bg-secondary);
}

/* ===== PAGE CONTENT ===== */
.page-content{flex:1;overflow-y:auto;padding:24px}
.page-header{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  margin-bottom:24px;
  gap:16px;
}
.page-header__title{font-size:22px;font-weight:700;letter-spacing:-0.4px}
.page-header__sub{color:var(--text-secondary);font-size:13px;margin-top:2px}
.bot-detail__head{display:flex;align-items:center;gap:10px;margin-bottom:4px;flex-wrap:wrap}
.bot-detail__actions{display:flex;gap:6px;flex-wrap:wrap}
.grid-2col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-4col{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.grid-dashboard{display:grid;grid-template-columns:2fr 1fr;gap:14px}

/* ===== BUTTONS ===== */
.btn{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:8px 14px;
  border-radius:var(--radius);
  font-size:13px;
  font-weight:600;
  border:1px solid transparent;
  cursor:pointer;
  transition:all var(--transition);
  font-family:var(--font);
  white-space:nowrap;
}
.btn-primary{background:var(--cyan);color:#001319;border-color:var(--cyan)}
.btn-primary:hover{background:#22D3EE}
.btn-secondary{background:var(--bg-surface);color:var(--text-primary);border-color:var(--border)}
.btn-secondary:hover{background:var(--bg-hover)}
.btn-ghost{background:transparent;color:var(--text-secondary);border-color:transparent}
.btn-ghost:hover{color:var(--text-primary);background:var(--bg-hover)}
.btn-danger{background:var(--red-bg);color:var(--red);border-color:rgba(239,68,68,0.3)}
.btn-danger:hover{background:rgba(239,68,68,0.2)}
.btn-success{background:var(--emerald-bg);color:var(--emerald);border-color:rgba(16,185,129,0.3)}
.btn-xs{padding:4px 8px;font-size:11px;border-radius:var(--radius-xs)}
.btn-sm{padding:6px 10px;font-size:12px}
.btn-lg{padding:10px 20px;font-size:14px}
.btn:disabled{opacity:0.5;cursor:not-allowed}

/* ===== CARDS ===== */
.card{
  background:var(--bg-panel);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow);
}
.card__header{
  padding:14px 18px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.card__title{font-size:14px;font-weight:600}
.card__body{padding:18px}
.card__footer{
  padding:12px 18px;
  border-top:1px solid var(--border);
  background:var(--bg-secondary);
  border-radius:0 0 var(--radius-lg) var(--radius-lg);
  display:flex;
  justify-content:flex-end;
  gap:8px;
}

/* ===== METRICS GRID ===== */
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.metric-card{
  background:var(--bg-panel);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:16px 18px;
  box-shadow:var(--shadow);
}
.metric-card__label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.metric-card__value{font-size:26px;font-weight:700;line-height:1.1}
.metric-card__change{font-size:12px;margin-top:6px}
.metric-card__change.up{color:var(--emerald)}
.metric-card__change.down{color:var(--red)}

/* ===== TABLES ===== */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{
  text-align:left;
  padding:10px 14px;
  color:var(--text-muted);
  font-weight:500;
  font-size:12px;
  border-bottom:1px solid var(--border);
  white-space:nowrap;
}
td{
  padding:12px 14px;
  border-bottom:1px solid var(--border);
  vertical-align:middle;
}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg-hover)}

/* ===== STATUS ===== */
.status{
  display:inline-flex;
  align-items:center;
  gap:6px;
  font-size:12px;
  font-weight:600;
  padding:3px 10px;
  border-radius:999px;
}
.status-online{background:var(--emerald-bg);color:var(--emerald)}
.status-offline{background:var(--red-bg);color:var(--red)}
.status-pending{background:var(--amber-bg);color:var(--amber)}
.status-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.status-error{background:var(--red-bg);color:var(--red)}
.text-muted{color:var(--text-muted)}

/* ===== TAGS ===== */
.tag{
  display:inline-flex;
  padding:2px 8px;
  border-radius:var(--radius-xs);
  font-size:11px;
  font-weight:600;
  background:var(--bg-surface);
  color:var(--text-secondary);
  border:1px solid var(--border);
}
.tag-cyan{background:var(--cyan-bg);color:var(--cyan);border-color:rgba(6,182,212,0.3)}
.tag-emerald{background:var(--emerald-bg);color:var(--emerald);border-color:rgba(16,185,129,0.3)}
.tag-amber{background:var(--amber-bg);color:var(--amber);border-color:rgba(245,158,11,0.3)}
.tag-red{background:var(--red-bg);color:var(--red);border-color:rgba(239,68,68,0.3)}

/* ===== TABS ===== */
.tabs{
  display:flex;
  gap:2px;
  border-bottom:1px solid var(--border);
  margin-bottom:20px;
}
.tab{
  padding:10px 16px;
  background:transparent;
  border:none;
  color:var(--text-secondary);
  font-size:13px;
  font-weight:500;
  cursor:pointer;
  border-bottom:2px solid transparent;
  margin-bottom:-1px;
  font-family:var(--font);
  transition:all var(--transition);
}
.tab:hover{color:var(--text-primary)}
.tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}

/* ===== FORMS ===== */
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:4px}
.form-input,.form-select,.form-textarea{
  width:100%;
  background:var(--bg-secondary);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:9px 12px;
  color:var(--text-primary);
  font-size:13px;
  outline:none;
  font-family:var(--font);
  transition:border-color var(--transition);
}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(6,182,212,0.08)}
.form-textarea{min-height:100px;resize:vertical;font-family:var(--mono);font-size:12px}
.form-hint{font-size:11px;color:var(--text-muted);margin-top:4px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-inline{display:flex;align-items:center;gap:10px}

/* ===== MODAL ===== */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(2,6,12,0.75);
  backdrop-filter:blur(2px);
  z-index:200;
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.2s;
}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal{
  background:var(--bg-panel);
  border:1px solid var(--border);
  border-radius:var(--radius-xl);
  width:500px;
  max-width:92%;
  max-height:90vh;
  overflow:hidden;
  box-shadow:var(--shadow-lg);
  transform:scale(0.95);
  transition:transform 0.2s;
}
.modal-overlay.open .modal{transform:scale(1)}
.modal__header{
  padding:16px 20px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.modal__title{font-size:16px;font-weight:600}
.modal__close{
  background:none;border:none;
  color:var(--text-muted);font-size:22px;
  cursor:pointer;padding:4px;line-height:1;
}
.modal__close:hover{color:var(--text-primary)}
.modal__body{padding:20px;overflow-y:auto;max-height:60vh}
.modal__footer{
  padding:14px 20px;
  border-top:1px solid var(--border);
  display:flex;
  justify-content:flex-end;
  gap:10px;
}

/* ===== TOAST ===== */
.toast-container{
  position:fixed;
  bottom:20px;right:20px;
  z-index:300;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.toast{
  background:var(--bg-surface);
  border:1px solid var(--border);
  border-left:3px solid var(--cyan);
  border-radius:var(--radius);
  padding:12px 16px;
  min-width:280px;
  max-width:400px;
  box-shadow:var(--shadow-md);
  animation:toastIn 0.25s ease;
}
.toast-success{border-left-color:var(--emerald)}
.toast-error{border-left-color:var(--red)}
.toast-warning{border-left-color:var(--amber)}
.toast-info{border-left-color:var(--blue)}
.toast__title{font-size:13px;font-weight:600}
.toast__msg{font-size:12px;color:var(--text-secondary);margin-top:2px}
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ===== SKELETON ===== */
.skeleton{background:var(--bg-surface);border-radius:var(--radius);animation:pulse 1.5s ease-in-out infinite}
.skeleton-text{height:14px;margin-bottom:8px;width:80%}
.skeleton-text.short{width:50%}
.skeleton-card{height:100px;margin-bottom:14px}
.skeleton-table{height:40px;margin-bottom:4px}
@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:0.7}}

/* ===== EMPTY STATE ===== */
.empty-state{text-align:center;padding:60px 20px}
.empty-state__icon{font-size:48px;margin-bottom:12px;opacity:0.5}
.empty-state__title{font-size:18px;font-weight:600;margin-bottom:6px}
.empty-state__desc{color:var(--text-secondary);font-size:13px;margin-bottom:16px;max-width:400px;margin-left:auto;margin-right:auto}

/* ===== CONFIRM DIALOG ===== */
.confirm-dialog{text-align:center;padding:10px 0}
.confirm-dialog__icon{font-size:40px;margin-bottom:10px}
.confirm-dialog__title{font-size:17px;font-weight:600;margin-bottom:4px}
.confirm-dialog__desc{color:var(--text-secondary);font-size:13px;margin-bottom:18px}

/* ===== ONBOARDING ===== */
.onboarding-step{text-align:center;padding:30px 20px}
.onboarding-step__icon{font-size:52px;margin-bottom:12px}
.onboarding-step__title{font-size:20px;font-weight:700;margin-bottom:8px}
.onboarding-step__desc{color:var(--text-secondary);font-size:14px;margin-bottom:24px;max-width:380px;margin-left:auto;margin-right:auto}
.onboarding-progress{display:flex;justify-content:center;gap:6px;margin-bottom:24px}
.onboarding-progress .dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:background var(--transition)}
.onboarding-progress .dot.active{background:var(--cyan)}
.onboarding-progress .dot.done{background:var(--emerald)}

/* ===== BOT DETAIL TABS CONTENT ===== */
.tab-content{display:none}
.tab-content.active{display:block}

/* ===== CHARTS (CSS) ===== */
.chart-bar{display:flex;align-items:flex-end;gap:6px;height:160px;padding:10px 0}
.chart-bar__item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.chart-bar__fill{width:100%;border-radius:4px 4px 0 0;min-height:4px;transition:height 0.5s ease}
.chart-bar__label{font-size:10px;color:var(--text-muted);margin-top:4px}

/* ===== ACTIVITY LIST ===== */
.activity-list{list-style:none}
.activity-item{
  display:flex;
  align-items:flex-start;
  gap:12px;
  padding:10px 0;
  border-bottom:1px solid var(--border);
}
.activity-item:last-child{border-bottom:none}
.activity-item__dot{
  width:8px;height:8px;border-radius:50%;
  margin-top:6px;flex-shrink:0;
}
.activity-item__content{flex:1;min-width:0}
.activity-item__title{font-size:13px;font-weight:500}
.activity-item__meta{font-size:11px;color:var(--text-muted);margin-top:1px}

/* ===== INTEGRATION CARDS ===== */
.integ-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.integ-card{
  background:var(--bg-panel);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:18px;
  text-align:center;
  box-shadow:var(--shadow);
  transition:border-color var(--transition);
}
.integ-card:hover{border-color:var(--border-focus)}
.integ-card__icon{font-size:32px;margin-bottom:8px}
.integ-card__name{font-size:14px;font-weight:600;margin-bottom:2px}
.integ-card__desc{font-size:11px;color:var(--text-muted);margin-bottom:12px}

/* ===== BILLING PLANS ===== */
.plans-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.plan-card{
  background:var(--bg-panel);
  border:1px solid var(--border);
  border-radius:var(--radius-xl);
  padding:24px;
  text-align:center;
  box-shadow:var(--shadow);
  position:relative;
}
.plan-card.popular{border-color:var(--cyan);box-shadow:0 0 0 1px var(--cyan)}
.plan-card__badge{
  position:absolute;top:-10px;left:50%;transform:translateX(-50%);
  background:var(--cyan);color:#001319;
  font-size:11px;font-weight:700;
  padding:3px 12px;border-radius:999px;
}
.plan-card__name{font-size:16px;font-weight:700;margin-bottom:4px}
.plan-card__price{font-size:32px;font-weight:700;margin-bottom:4px}
.plan-card__price span{font-size:14px;font-weight:400;color:var(--text-muted)}
.plan-card__desc{font-size:12px;color:var(--text-secondary);margin-bottom:16px}
.plan-card__features{list-style:none;text-align:left;margin-bottom:18px}
.plan-card__features li{font-size:12px;padding:4px 0;color:var(--text-secondary);display:flex;align-items:center;gap:6px}
.plan-card__features li:before{content:'✓';color:var(--emerald);font-weight:700}

/* ===== SKELETON LOADING ===== */
.skeleton-loading{display:block}
.skeleton-loaded{display:none}

/* ===== RESPONSIVE ===== */
@media(max-width:1200px){
  .metrics-grid{grid-template-columns:repeat(2,1fr)}
  .plans-grid,.integ-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:900px){
  .sidebar{position:fixed;transform:translateX(-100%);z-index:150;height:100vh;max-height:100vh;top:0;left:0}
  .sidebar.open{transform:translateX(0)}
  .sidebar__nav{flex:1;overflow-y:auto;min-height:0}
  .sidebar__bottom{flex-shrink:0}
  .main{margin-left:0}
  .mobile-menu{display:grid!important}
  .plans-grid,.integ-grid{grid-template-columns:1fr}
}
@media(max-width:640px){
  .metrics-grid{grid-template-columns:1fr}
  .search-wrap{display:none}
  .page-content{padding:12px}
  .form-row{grid-template-columns:1fr}
  .grid-2col,.grid-4col,.grid-dashboard{grid-template-columns:1fr !important}

function renderNav(){
  const nav = document.getElementById('main-nav');
  nav.innerHTML = NAV.map(g=>`

      ${g.items.map(i=>`<button class="nav-item" data-page="${i.id}"><span class="nav-icon">${i.icon}</span>${i.label}</button>`).join('')}
    </div>
  `).join('');

function handleGlobalClick(e){
  let el;
  if(el = e.target.closest('.nav-item')){ navigate(el.dataset.page); return }
  if(el = e.target.closest('[data-action]')){ handleAction(el.dataset.action, el.dataset); return }
  if(el = e.target.closest('.tab')){ handleTabClick(el); return }
  if(!e.target.closest('.search-wrap')){ document.getElementById('searchResults').classList.remove('active'); }
}
function setActive(page){
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active', el.dataset.page===page));
}

  STATE.page = page;

    logs:'Logs & Events', audit:'Audit Log', team:'Team & Roles',
    settings:'Settings', billing:'Billing', 'bot-detail':'Bot Details'
  };
  document.getElementById('breadcrumb').textContent = titles[page]||page;

    content.innerHTML = showBotDetail(params.botId);
  } else {
    content.innerHTML = pageRenderers[page] ? pageRenderers[page]() : pageNotFound(page);

}

  const actions = {

  const mode = document.getElementById('newBotMode').value;
  DATA.bots.push({ id:'b'+Date.now(), name, username:'@'+name.toLowerCase().replace(/\s/g,'_'), token:token.slice(0,2)+'******'+token.slice(-2), status:'pending', mode, users:0, cmds:0, groups:0, chats:0, lastErr:'—', lastMsg:'—', created:new Date().toISOString().slice(0,10) });

      <div class="modal__footer">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-danger" onclick="doDeleteBot('${botId}')">Delete Forever</button>
      </div>
    </div>`;
  overlay.classList.add('open');
}
function doDeleteBot(botId){
  const idx = DATA.bots.findIndex(x=>x.id===botId);
  if(idx>=0) DATA.bots.splice(idx,1);
  closeModal();
  showToast('Bot deleted','warning');
  navigate('bots');
}
function confirmRotate(botId){
  const b = DATA.bots.find(x=>x.id===botId);
  const overlay = document.getElementById('modalOverlay');
  overlay.innerHTML = `
    <div class="modal" style="width:400px">
      <div class="modal__header"><div class="modal__title">Rotate Token</div><button class="modal__close" onclick="closeModal()">×</button></div>
      <div class="modal__body">
        <div class="confirm-dialog">
          <div class="confirm-dialog__icon">🔑</div>
          <div class="confirm-dialog__title">Rotate token for ${b?b.name:'this bot'}?</div>
          <div class="confirm-dialog__desc">The current token will be revoked immediately. You'll need to update your bot server with the new one.</div>
        </div>
      </div>
      <div class="modal__footer">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-danger" onclick="doRotate('${botId}')">Rotate Token</button>
      </div>
    </div>`;
  overlay.classList.add('open');
}
function doRotate(botId){
  const b = DATA.bots.find(x=>x.id===botId);
  if(b) b.token = Math.random().toString(36).slice(2,4)+'******'+Math.random().toString(36).slice(2,4).toUpperCase();
  closeModal();
  showToast('Token rotated successfully','success');
  if(STATE.page==='bot-detail') navigate('bot-detail',{botId});
}
function testBot(botId){
  const b = DATA.bots.find(x=>x.id===botId);
  showToast(`📨 Test message sent to ${b?b.name:'bot'}`,'success');
}

/* ===== TABS ===== */
function handleTabClick(el){
  document.querySelectorAll('.tabs .tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  const tabId = el.dataset.tab;
  const botId = el.dataset.bot;
  if(tabId==='overview' && botId) document.getElementById('tab-overview-'+botId).classList.add('active');
  else if(tabId==='commands' && botId) document.getElementById('tab-commands-'+botId).classList.add('active');
  else if(tabId==='chats' && botId) document.getElementById('tab-chats-'+botId).classList.add('active');
  else if(tabId==='logs' && botId) document.getElementById('tab-logs-'+botId).classList.add('active');
  else if(tabId==='settings' && botId) document.getElementById('tab-settings-'+botId).classList.add('active');
}

function sendBroadcast(){
  const msg = document.getElementById('broadcastMsg').value.trim();
  if(!msg){ showToast('Message cannot be empty','error'); return; }
  const totalUsers = DATA.bots.reduce((s,b)=>s+b.users,0);
  showToast(`📢 Broadcast sent to ${totalUsers.toLocaleString()} users`,'success');
}

/* ===== SEARCH ===== */
function handleSearch(e){
  const q = e.target.value.trim().toLowerCase();
  const results = document.getElementById('searchResults');
  if(!q){ results.classList.remove('active'); return; }
  const matches = [];
  DATA.bots.filter(b=>b.name.toLowerCase().includes(q)||b.username.toLowerCase().includes(q))
    .forEach(b=>matches.push({type:'bot',label:b.name,sub:b.username,id:b.id}));
  DATA.commands.filter(c=>c.cmd.includes(q)||c.desc.toLowerCase().includes(q))
    .forEach(c=>matches.push({type:'cmd',label:c.cmd,sub:c.desc,id:null}));
  if(!matches.length){
    results.innerHTML='<div class="search-results__item disabled">No results found</div>';
  } else {
    results.innerHTML=matches.slice(0,8).map((m,i)=>
      `<div class="search-results__item" data-idx="${i}"><strong>${m.label}</strong><div style="font-size:11px;color:var(--text-muted)">${m.sub}</div></div>`
    ).join('');
    results.querySelectorAll('.search-results__item').forEach((el,i)=>{
      el.onclick=()=>{
        results.classList.remove('active');
        document.getElementById('globalSearch').value='';
        if(matches[i].type==='bot') navigate('bot-detail',{botId:matches[i].id});
        else navigate('commands');
      };
    });
  }
  results.classList.add('active');
}

/* ===== TOASTS ===== */
function showToast(title, level='info'){
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast toast-'+level;
  t.innerHTML = `<div class="toast__title">${title}</div>`;
  c.appendChild(t);
  setTimeout(()=>t.remove(), 3000);
}

    </div>`;
  overlay.classList.add('open');
}

/* ===== START ===== */
function showOnboarding(){
  const overlay = document.getElementById('modalOverlay');
  let step = 0;
  const steps = [
    { icon:'🚀', title:'Welcome to BotForge', desc:'Connect your Telegram bots, manage commands, send broadcasts, and track analytics — all in one enterprise-grade platform.' },
    { icon:'⚡', title:'Add Your First Bot', desc:'Enter your bot token from @BotFather. We\'ll handle the rest — webhook setup, commands sync, and monitoring.' },
    { icon:'👥', title:'Invite Your Team', desc:'Set up role-based access control. Add admins, editors, and viewers with granular permissions per bot.' },
  ];
  function renderStep(){
    const s = steps[step];
    overlay.innerHTML = `
      <div class="modal" style="width:500px">
        <div class="modal__header"><div class="modal__title">BotForge Setup</div><button class="modal__close" onclick="closeModal();localStorage.setItem('botforge_onboarded','1')">×</button></div>
        <div class="modal__body">
          <div class="onboarding-step">
            <div class="onboarding-progress">
              ${steps.map((_,i)=>`<div class="dot ${i<step?'done':i===step?'active':''}"></div>`).join('')}
            </div>
            <div class="onboarding-step__icon">${s.icon}</div>
            <div class="onboarding-step__title">${s.title}</div>
            <div class="onboarding-step__desc">${s.desc}</div>
          </div>
        </div>
        <div class="modal__footer">
          <button class="btn btn-ghost" onclick="closeModal();localStorage.setItem('botforge_onboarded','1');showToast('Setup skipped — you can always revisit','info')">Skip</button>
          ${step>0?`<button class="btn btn-secondary" onclick="showOnboardingStep(${step-1})">Back</button>`:''}
          <button class="btn btn-primary" onclick="showOnboardingStep(${step+1})">${step<2?'Next':'Get Started'}</button>
        </div>
      </div>`;
    overlay.classList.add('open');
  }
  window.showOnboardingStep = function(n){
    if(n>=3){ closeModal(); localStorage.setItem('botforge_onboarded','1'); showToast('🎉 You\'re all set! Add your first bot.','success'); return; }
    step = n; renderStep();
  };
  renderStep();
}
init();
