  <text x="300" y="500" text-anchor="middle" font-family="Georgia,serif" font-size="24" fill="#b98a5e" font-weight="bold">Елена</text>
  <text x="300" y="528" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#9a8a74">Мастер маникюра и педикюра</text>
  <text x="300" y="550" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#c9a961">Санкт-Петербург</text>
